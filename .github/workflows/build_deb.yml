name: Build and publish .deb package

on:
  push:
    branches:
      - '**'  # Se ejecuta en cualquier rama

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Show user and current directory
        run: |
          echo "Current user: $(whoami)"
          echo "Current directory: $(pwd)"

      - name: Set up dependencies
        run: |
          sudo apt update
          sudo apt install -y dpkg-dev jq

      - name: Show file structure for debugging
        run: |
          echo "Listing current directory:"
          ls -R

      - name: Set permissions
        run: |
          ls -l ./usr/local/sbin/
          chmod 0775 ./DEBIAN/prerm
          chmod +x ./usr/local/sbin/ssp

      - name: List files before creating directory for .deb
        run: |
          echo "Listing files in the current directory before creating .deb directory:"
          ls -al

      - name: Create directory structure for .deb
        run: |
          mkdir -p package/DEBIAN
          mkdir -p package/usr/local/sbin
          mkdir -p package/etc/ssp
          mkdir -p package/lib/systemd/system

          cp -r DEBIAN/* package/DEBIAN/
          cp -r usr/local/sbin/* package/usr/local/sbin/
          cp -r etc/ssp/* package/etc/ssp/
          cp -r lib/systemd/* package/lib/systemd/system/

      - name: Build .deb package
        run: |
          dpkg-deb --build package ssp-package.deb

      - name: Set up Git authentication
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git remote set-url origin https://x-access-token:${{ secrets.SSP_TOKEN }}@github.com/${{ github.repository }}.git

      - name: Get or create release
        id: get_release
        run: |
          # Buscar release existente con tag 'latest'
          existing=$(curl -s -H "Authorization: token ${{ secrets.SSP_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/releases/tags/latest)

          release_id=$(echo "$existing" | jq -r '.id')

          if [ "$release_id" = "null" ]; then
            echo "No existe release 'latest'. Creando..."
            created=$(curl -s -X POST \
              -H "Authorization: token ${{ secrets.SSP_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d '{"tag_name": "latest", "name": "Latest Release", "body": "Auto-generated release"}' \
              https://api.github.com/repos/${{ github.repository }}/releases)
            release_id=$(echo "$created" | jq -r '.id')
          else
            echo "Release existente encontrada. ID: $release_id"
          fi

          echo "release_id=$release_id" >> $GITHUB_OUTPUT

      - name: Upload .deb asset
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.SSP_TOKEN }}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @ssp-package.deb \
            "https://uploads.github.com/repos/${{ github.repository }}/releases/${{ steps.get_release.outputs.release_id }}/assets?name=ssp-package.deb"
