name: Build and publish .deb package

on:
  push:
    branches:
      - '**'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
      - name: Set up dependencies
        run: |
          sudo apt update
          sudo apt install -y dpkg-dev jq curl
      - name: Create directory structure for .deb
        run: |
          mkdir -p package
          cp -r etc lib usr DEBIAN package/
          chmod 0755 package/DEBIAN/preinst package/DEBIAN/postinst package/DEBIAN/prerm
          chmod +x package/usr/sbin/victrix
          find package/usr/share/man -type f -exec chmod 0644 {} +

      - name: Build .deb package
        run: |
          dpkg-deb --build package victrix.deb

      - name: Get or create release
        id: get_release
        run: |
          existing=$(curl -s -H "Authorization: token ${{ secrets.SSP_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/releases/tags/latest)

          release_id=$(echo "$existing" | jq -r '.id')
          if [ "$release_id" = "null" ]; then
            created=$(curl -s -X POST \
              -H "Authorization: token ${{ secrets.SSP_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d '{"tag_name": "latest", "name": "Latest Release", "body": "Auto-generated release"}' \
              https://api.github.com/repos/${{ github.repository }}/releases)
            release_id=$(echo "$created" | jq -r '.id')
          else
            asset_id=$(echo "$existing" | jq -r '.assets[] | select(.name=="victrix.deb") | .id')
            if [ "$asset_id" != "" ] && [ "$asset_id" != "null" ]; then
              curl -s -X DELETE -H "Authorization: token ${{ secrets.SSP_TOKEN }}" \
                https://api.github.com/repos/${{ github.repository }}/releases/assets/$asset_id
            fi
          fi
          echo "release_id=$release_id" >> $GITHUB_OUTPUT

      - name: Upload .deb asset
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.SSP_TOKEN }}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @victrix.deb \
            "https://uploads.github.com/repos/${{ github.repository }}/releases/${{ steps.get_release.outputs.release_id }}/assets?name=victrix.deb"